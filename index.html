<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#070d1a">
  <title>Team Noticeboard</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070d1a;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #f0f4ff;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --blue: #38bdf8;
      --amber: #fbbf24;
      --green: #34d399;
      --red: #f87171;
      --purple: #a78bfa;
      --pink: #f472b6;
      --font-display: 'Bebas Neue', cursive;
      --font-head: 'Barlow', sans-serif;
      --font-body: 'Nunito', sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); overflow:hidden; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background: radial-gradient(ellipse at 15% 50%, rgba(56,189,248,.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 85% 30%, rgba(167,139,250,.05) 0%, transparent 55%);
    }

    /* ── TOP BAR ── */
    #top-bar {
      position:fixed; top:0; left:0; right:0; height:64px;
      display:flex; align-items:center; gap:12px; padding:0 18px;
      background:rgba(7,13,26,.93); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border); z-index:50;
    }
    #company-name { font-family:var(--font-head); font-size:17px; font-weight:800; color:var(--blue); letter-spacing:-.5px; white-space:nowrap; }
    #slide-dots { display:flex; gap:6px; align-items:center; flex:1; padding:0 12px; }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--border); transition:all .35s; cursor:pointer; }
    .dot.active { background:var(--blue); width:22px; border-radius:3px; }
    #clock-block { text-align:right; }
    #clock { font-family:var(--font-display); font-size:30px; line-height:1; color:var(--text); letter-spacing:3px; }
    #date-str { font-size:10px; color:var(--text-dim); font-family:var(--font-head); letter-spacing:1px; text-transform:uppercase; }
    #weather-block { display:flex; flex-direction:column; align-items:flex-end; margin-left:12px; padding-left:12px; border-left:1px solid var(--border); }
    #w-temp { font-family:var(--font-display); font-size:26px; line-height:1; color:var(--amber); }
    #w-desc { font-size:10px; color:var(--text-dim); font-family:var(--font-head); letter-spacing:1px; text-transform:uppercase; }

    /* ── PROGRESS BAR ── */
    #prog-track { position:fixed; top:64px; left:0; right:0; height:2px; background:var(--border); z-index:50; }
    #prog-fill { height:100%; width:0%; background:linear-gradient(90deg, var(--blue), var(--purple)); }

    /* ── SLIDES ── */
    #slides { position:fixed; top:66px; left:0; right:0; bottom:44px; overflow:hidden; }
    .slide { position:absolute; inset:0; display:flex; flex-direction:column; padding:18px 22px; opacity:0; transition:opacity .65s ease; pointer-events:none; }
    .slide.active { opacity:1; pointer-events:all; }

    .slide-hdr { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-shrink:0; }
    .slide-icon { font-size:20px; }
    .slide-title { font-family:var(--font-head); font-size:12px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:2px; flex:1; }
    .slide-tag { font-family:var(--font-head); font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; letter-spacing:1px; text-transform:uppercase; }

    /* ── ANNOUNCEMENTS ── */
    .ann-card { flex:1; display:flex; flex-direction:column; justify-content:center; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:32px 40px; position:relative; overflow:hidden; }
    .ann-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .ann-card.urgent::before  { background:var(--red); }
    .ann-card.important::before { background:var(--amber); }
    .ann-card.normal::before  { background:var(--blue); }
    .ann-pri { font-size:11px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:12px; }
    .ann-pri.urgent   { color:var(--red); }
    .ann-pri.important { color:var(--amber); }
    .ann-pri.normal   { color:var(--blue); }
    .ann-title { font-family:var(--font-head); font-size:38px; font-weight:800; line-height:1.12; color:var(--text); margin-bottom:14px; }
    .ann-body-text { font-size:18px; color:var(--text-dim); line-height:1.65; max-width:78%; }
    .ann-bg-char { position:absolute; bottom:10px; right:24px; font-family:var(--font-display); font-size:130px; color:rgba(255,255,255,.025); line-height:1; user-select:none; }

    /* ── KPIs ── */
    .kpi-grid { flex:1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:10px; }
    .kpi-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px 24px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; }
    .kpi-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
    .kpi-card.up::after      { background:var(--green); }
    .kpi-card.down::after    { background:var(--red); }
    .kpi-card.neutral::after { background:var(--blue); }
    .kpi-label { font-family:var(--font-head); font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; }
    .kpi-value { font-family:var(--font-display); font-size:54px; line-height:1; color:var(--text); }
    .kpi-change { font-family:var(--font-head); font-size:13px; font-weight:700; }
    .kpi-card.up .kpi-change      { color:var(--green); }
    .kpi-card.down .kpi-change    { color:var(--red); }
    .kpi-card.neutral .kpi-change { color:var(--blue); }

    /* ── ROTA ── */
    .rota-wrap { flex:1; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--border); border-radius:18px; overflow:hidden; }
    .rota-week { padding:10px 18px; background:var(--surface2); border-bottom:1px solid var(--border); font-family:var(--font-head); font-size:12px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
    .rota-tbl { width:100%; border-collapse:collapse; }
    .rota-tbl th { padding:9px 12px; font-family:var(--font-head); font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); text-align:center; }
    .rota-tbl th:first-child { text-align:left; }
    .rota-tbl td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.03); text-align:center; }
    .rota-tbl td:first-child { text-align:left; font-weight:700; font-size:14px; color:var(--text); }
    .rota-tbl tr:last-child td { border-bottom:none; }
    .rota-tbl tbody tr:hover td { background:var(--surface2); }
    .pill { display:inline-block; padding:3px 11px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .pill-office { background:rgba(56,189,248,.15); color:var(--blue); }
    .pill-remote { background:rgba(167,139,250,.15); color:var(--purple); }
    .pill-leave  { background:rgba(52,211,153,.15); color:var(--green); }
    .pill-off    { background:rgba(148,163,184,.1); color:var(--text-muted); }

    /* ── TASKS ── */
    .tasks-grid { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:8px; overflow-y:auto; }
    .task-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; display:flex; flex-direction:column; gap:8px; border-left:3px solid transparent; }
    .task-card.high   { border-left-color:var(--red); }
    .task-card.medium { border-left-color:var(--amber); }
    .task-card.low    { border-left-color:var(--green); }
    .task-text { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; }
    .task-meta { display:flex; align-items:center; gap:8px; }
    .task-who { font-size:11px; color:var(--text-dim); font-weight:600; }
    .task-pri { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1px; padding:2px 8px; border-radius:10px; }
    .task-card.high   .task-pri { background:rgba(248,113,113,.15); color:var(--red); }
    .task-card.medium .task-pri { background:rgba(251,191,36,.15);  color:var(--amber); }
    .task-card.low    .task-pri { background:rgba(52,211,153,.15);  color:var(--green); }

    /* ── BIRTHDAY ── */
    .bday-slide { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; position:relative; overflow:hidden; }
    .bday-emoji { font-size:80px; animation:bounce 1.2s ease-in-out infinite alternate; }
    @keyframes bounce { from { transform:translateY(0); } to { transform:translateY(-14px); } }
    .bday-name { font-family:var(--font-display); font-size:68px; color:var(--text); letter-spacing:2px; text-align:center; }
    .bday-type { font-family:var(--font-head); font-size:16px; font-weight:700; color:var(--amber); text-transform:uppercase; letter-spacing:4px; text-align:center; }
    .bday-msg  { font-size:17px; color:var(--text-dim); text-align:center; }
    .confetti { position:absolute; inset:0; pointer-events:none; }
    .cc { position:absolute; width:8px; height:8px; border-radius:2px; animation:fall linear infinite; }
    @keyframes fall { 0%{top:-5%;opacity:1;transform:rotate(0deg);} 100%{top:105%;opacity:.5;transform:rotate(360deg);} }

    /* ── COUNTDOWN ── */
    .cd-grid { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .cd-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px 26px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden; position:relative; }
    .cd-label { font-family:var(--font-head); font-size:12px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
    .cd-nums { display:flex; gap:6px; align-items:flex-end; }
    .cd-unit { display:flex; flex-direction:column; align-items:center; gap:2px; }
    .cd-n { font-family:var(--font-display); font-size:46px; line-height:1; color:var(--text); }
    .cd-u { font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; }
    .cd-sep { font-family:var(--font-display); font-size:36px; color:var(--text-muted); padding-bottom:4px; }
    .cd-date { font-size:11px; color:var(--text-muted); font-family:var(--font-head); margin-top:8px; }
    .cd-accent { position:absolute; top:0; left:0; width:3px; bottom:0; border-radius:8px 0 0 8px; }

    /* ── WEEKLY WIN ── */
    .win-card { flex:1; display:flex; flex-direction:column; justify-content:center; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:32px 40px; position:relative; overflow:hidden; }
    .win-trophy { font-size:56px; margin-bottom:16px; }
    .win-headline { font-family:var(--font-head); font-size:36px; font-weight:800; line-height:1.15; color:var(--text); margin-bottom:12px; }
    .win-detail { font-size:17px; color:var(--text-dim); line-height:1.65; max-width:80%; }
    .win-who { display:inline-flex; align-items:center; gap:8px; margin-top:20px; background:rgba(251,191,36,.12); border:1px solid rgba(251,191,36,.25); border-radius:40px; padding:8px 20px; }
    .win-who-name { font-size:14px; font-weight:700; color:var(--amber); }
    .win-stars { letter-spacing:2px; font-size:14px; }
    .win-glow { position:absolute; top:-60px; right:-60px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle, rgba(251,191,36,.12) 0%, transparent 70%); pointer-events:none; }

    /* ── THERMOMETER ── */
    .thermo-wrap { flex:1; display:flex; gap:18px; }
    .thermo-left { display:flex; flex-direction:column; justify-content:center; flex:1; gap:18px; }
    .thermo-right { display:flex; flex-direction:column; align-items:center; justify-content:center; width:110px; }
    .thermo-label { font-family:var(--font-head); font-size:12px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; }
    .thermo-value { font-family:var(--font-display); font-size:62px; line-height:1; color:var(--text); }
    .thermo-target { font-size:14px; color:var(--text-muted); font-family:var(--font-head); }
    .thermo-pct { font-family:var(--font-display); font-size:48px; color:var(--green); margin-top:8px; }
    .thermo-msg { font-size:16px; color:var(--text-dim); line-height:1.5; max-width:400px; }
    /* SVG thermometer built via JS */
    #thermo-svg { width:80px; height:100%; }

    /* ── STATUS BOARD ── */
    .status-grid { flex:1; display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
    .status-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px 14px; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; transition:all .2s; user-select:none; }
    .status-card:hover { background:var(--surface2); }
    .status-card:active { transform:scale(.97); }
    .s-avatar { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; font-family:var(--font-head); }
    .s-name { font-size:13px; font-weight:700; color:var(--text); }
    .s-status { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:3px 10px; border-radius:20px; }
    .s-dot { width:10px; height:10px; border-radius:50%; margin-left:4px; display:inline-block; }

    /* Status colours */
    .st-in      .s-status { background:rgba(52,211,153,.15);  color:var(--green);  }
    .st-remote  .s-status { background:rgba(167,139,250,.15); color:var(--purple); }
    .st-away    .s-status { background:rgba(251,191,36,.15);  color:var(--amber);  }
    .st-meeting .s-status { background:rgba(56,189,248,.15);  color:var(--blue);   }
    .st-off     .s-status { background:rgba(148,163,184,.1);  color:var(--text-muted); }

    .st-in      .s-avatar { background:rgba(52,211,153,.15);  color:var(--green); }
    .st-remote  .s-avatar { background:rgba(167,139,250,.15); color:var(--purple); }
    .st-away    .s-avatar { background:rgba(251,191,36,.15);  color:var(--amber); }
    .st-meeting .s-avatar { background:rgba(56,189,248,.15);  color:var(--blue); }
    .st-off     .s-avatar { background:rgba(148,163,184,.1);  color:var(--text-muted); }

    .status-tap-hint { font-size:10px; color:var(--text-muted); text-align:center; margin-top:4px; font-family:var(--font-head); }

    /* ── STATUS PICKER MODAL ── */
    .s-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(8px); }
    .s-overlay.open { display:flex; }
    .s-modal { background:#0f1828; border:1px solid var(--border); border-radius:20px; padding:28px 32px; min-width:280px; }
    .s-modal-name { font-family:var(--font-head); font-size:18px; font-weight:800; color:var(--text); margin-bottom:18px; }
    .s-opt { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px; cursor:pointer; transition:background .15s; margin-bottom:6px; font-size:14px; font-weight:600; }
    .s-opt:hover { background:var(--surface2); }
    .s-opt-dot { width:12px; height:12px; border-radius:50%; }

    /* ── LEADERBOARD ── */
    .lb-wrap { flex:1; display:flex; flex-direction:column; gap:7px; overflow-y:auto; }

    .lb-row {
      display:flex; align-items:center; gap:14px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:12px 18px; position:relative; overflow:hidden;
      transition:all .3s;
    }

    .lb-row.rank-1 { background:rgba(251,191,36,.08); border-color:rgba(251,191,36,.3); }
    .lb-row.rank-2 { background:rgba(148,163,184,.06); border-color:rgba(148,163,184,.2); }
    .lb-row.rank-3 { background:rgba(205,127,50,.06);  border-color:rgba(205,127,50,.2); }

    .lb-bar {
      position:absolute; left:0; top:0; bottom:0;
      background:rgba(255,255,255,.03); transition:width 1.2s cubic-bezier(.4,0,.2,1);
    }

    .lb-rank {
      font-family:var(--font-display); font-size:28px; min-width:36px;
      text-align:center; position:relative; z-index:1;
    }

    .rank-1 .lb-rank { color:var(--amber); }
    .rank-2 .lb-rank { color:#cbd5e1; }
    .rank-3 .lb-rank { color:#cd7f32; }

    .lb-medal { font-size:22px; }

    .lb-info { flex:1; position:relative; z-index:1; }
    .lb-name { font-size:16px; font-weight:700; color:var(--text); }
    .lb-title { font-size:11px; color:var(--text-muted); font-family:var(--font-head); margin-top:1px; }

    .lb-score {
      font-family:var(--font-display); font-size:38px;
      position:relative; z-index:1; line-height:1;
    }

    .rank-1 .lb-score { color:var(--amber); }
    .rank-2 .lb-score { color:#cbd5e1; }
    .rank-3 .lb-score { color:#cd7f32; }
    .lb-row:not(.rank-1):not(.rank-2):not(.rank-3) .lb-score { color:var(--blue); }

    .lb-pts { font-size:10px; color:var(--text-muted); font-family:var(--font-head); text-align:right; }
    .lb-change { font-size:12px; font-weight:700; font-family:var(--font-head); }
    .lb-change.up   { color:var(--green); }
    .lb-change.down { color:var(--red); }
    .lb-change.same { color:var(--text-muted); }

    /* Trophy jump button */
    #lb-jump {
      display:flex; align-items:center; gap:6px;
      background:rgba(251,191,36,.12); border:1px solid rgba(251,191,36,.3);
      border-radius:10px; padding:7px 13px; cursor:pointer;
      font-family:var(--font-head); font-size:12px; font-weight:700;
      color:var(--amber); transition:all .2s; white-space:nowrap; flex-shrink:0;
    }

    #lb-jump:hover { background:rgba(251,191,36,.22); transform:translateY(-1px); }
    #lb-jump:active { transform:scale(.96); }
    .lb-jump-pulse { animation:pulse-glow 2s ease-in-out infinite; }
    @keyframes pulse-glow {
      0%,100% { box-shadow:0 0 0 0 rgba(251,191,36,0); }
      50%      { box-shadow:0 0 12px 3px rgba(251,191,36,.25); }
    }

    /* ── MEME / GIF ── */
    .meme-wrap {
      flex:1; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:14px; position:relative;
    }

    .meme-img {
      max-width:100%; max-height:calc(100% - 60px);
      border-radius:16px; object-fit:contain;
      box-shadow:0 8px 40px rgba(0,0,0,.5);
      border:1px solid var(--border);
    }

    .meme-caption {
      font-family:var(--font-head); font-size:15px; font-weight:600;
      color:var(--text-dim); text-align:center; max-width:80%;
    }

    .meme-tag {
      position:absolute; top:10px; right:10px;
      font-size:10px; font-weight:800; letter-spacing:2px;
      color:var(--text-muted); font-family:var(--font-head); text-transform:uppercase;
    }

    /* ── TICKER ── */
    #ticker-bar { position:fixed; bottom:0; left:0; right:0; height:44px; background:rgba(7,13,26,.97); border-top:1px solid var(--border); display:flex; align-items:center; overflow:hidden; z-index:50; }
    #ticker-label { flex-shrink:0; font-family:var(--font-head); font-size:10px; font-weight:800; color:#000; background:var(--blue); padding:0 14px; height:100%; display:flex; align-items:center; letter-spacing:2px; text-transform:uppercase; }
    #ticker-wrap { flex:1; overflow:hidden; height:100%; }
    #ticker-track { display:flex; align-items:center; height:100%; white-space:nowrap; animation:scroll-left 50s linear infinite; }
    #ticker-track:hover { animation-play-state:paused; }
    @keyframes scroll-left { 0%{transform:translateX(100vw);} 100%{transform:translateX(-100%);} }
    .tick-item { font-size:13px; color:var(--text-dim); font-family:var(--font-head); font-weight:500; padding:0 32px; display:inline-flex; align-items:center; gap:10px; }
    .tick-item::after { content:'✦'; color:var(--text-muted); font-size:7px; }
    .tick-news { color:var(--blue); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
  <div id="company-name">Team Board</div>
  <div id="slide-dots"></div>
  <button id="lb-jump" class="lb-jump-pulse" onclick="jumpToLeaderboard()" title="Go to Leaderboard">🏅 Leaderboard</button>
  <div id="clock-block">
    <div id="clock">00:00</div>
    <div id="date-str">Loading…</div>
  </div>
  <div id="weather-block">
    <div id="w-temp">--°</div>
    <div id="w-desc">weather</div>
  </div>
</div>

<div id="prog-track"><div id="prog-fill"></div></div>
<div id="slides"></div>

<!-- TICKER -->
<div id="ticker-bar">
  <div id="ticker-label">Updates</div>
  <div id="ticker-wrap"><div id="ticker-track"></div></div>
</div>

<!-- STATUS PICKER MODAL -->
<div class="s-overlay" id="s-overlay" onclick="overlayClose(event)">
  <div class="s-modal">
    <div class="s-modal-name" id="s-modal-name">Update Status</div>
    <div id="s-opts"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG & STATE
// ══════════════════════════════════════════
let cfg = null, slides = [], cur = 0, timer = null;
let lbSlideIndex = -1;
const STATUS_KEY = 'nb_status_v1';

const STATUSES = [
  { id:'in',      label:'In Office',   emoji:'🏢', color:'var(--green)'  },
  { id:'remote',  label:'Remote',      emoji:'🏠', color:'var(--purple)' },
  { id:'away',    label:'Away',        emoji:'⏸️',  color:'var(--amber)'  },
  { id:'meeting', label:'In Meeting',  emoji:'📞', color:'var(--blue)'   },
  { id:'off',     label:'Off Today',   emoji:'🌙', color:'var(--text-muted)' },
];

// ══════════════════════════════════════════
// LOAD
// ══════════════════════════════════════════
async function load() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    cfg = await r.json();
    apply();
  } catch(e) { console.error('data.json load failed', e); }
}
setInterval(load, 5 * 60 * 1000);

function apply() {
  if (!cfg) return;
  if (cfg.company_name) document.getElementById('company-name').textContent = cfg.company_name;
  buildSlides();
  buildTicker();
  if (cfg.weather_city) getWeather(cfg.weather_city);
  if (cfg.news_rss) loadNews(cfg.news_rss);
}

// ══════════════════════════════════════════
// BUILD SLIDES
// ══════════════════════════════════════════
function buildSlides() {
  const container = document.getElementById('slides');
  container.innerHTML = '';
  slides = []; cur = 0;

  // Birthday/Anniversary — inject first if today
  const bdays = checkBirthdays(cfg.birthdays || []);
  bdays.forEach(b => slides.push(bdaySlide(b)));

  // Weekly Win
  if (cfg.weekly_win) slides.push(winSlide(cfg.weekly_win));

  // Announcements
  (cfg.announcements || []).forEach(a => slides.push(annoSlide(a)));

  // KPIs
  if (cfg.kpis?.length) slides.push(kpiSlide(cfg.kpis));

  // Target Thermometer
  if (cfg.target) slides.push(thermoSlide(cfg.target));

  // Rota
  if (cfg.rota) slides.push(rotaSlide(cfg.rota));

  // Countdown Timers
  if (cfg.countdowns?.length) slides.push(countdownSlide(cfg.countdowns));

  // Team Status
  if (cfg.team?.length) slides.push(statusSlide(cfg.team));

  // Meme / GIF of the day
  if (cfg.meme) slides.push(memeSlide(cfg.meme));

  // Leaderboard
  if (cfg.leaderboard?.length) { lbSlideIndex = slides.length; slides.push(leaderboardSlide(cfg.leaderboard)); }

  // Tasks
  if (cfg.tasks?.length) slides.push(tasksSlide(cfg.tasks));

  if (!slides.length) return;
  slides.forEach(el => container.appendChild(el));
  makeDots();
  show(0);
  startPlay();
}

// ══════════════════════════════════════════
// SLIDE BUILDERS
// ══════════════════════════════════════════

// ── Announcement ──
function annoSlide(a) {
  const el = div('slide');
  const pri = a.priority || 'normal';
  const priLabel = pri==='urgent'?'🚨 URGENT': pri==='important'?'⚠️ IMPORTANT':'📌 NOTICE';
  el.innerHTML = `
    <div class="slide-hdr">
      <span class="slide-icon">📢</span>
      <span class="slide-title">Announcement</span>
      <span class="slide-tag" style="background:${pc(pri,.15)};color:${pc(pri)}">${pri.toUpperCase()}</span>
    </div>
    <div class="ann-card ${pri}">
      <div class="ann-pri ${pri}">${priLabel}</div>
      <div class="ann-title">${esc(a.title||'')}</div>
      <div class="ann-body-text">${esc(a.body||'')}</div>
      <div class="ann-bg-char">"</div>
    </div>`;
  return el;
}

// ── KPI ──
function kpiSlide(kpis) {
  const el = div('slide');
  el.innerHTML = `
    <div class="slide-hdr"><span class="slide-icon">📊</span><span class="slide-title">Key Metrics</span></div>
    <div class="kpi-grid">
      ${kpis.slice(0,4).map(k=>`
        <div class="kpi-card ${k.trend||'neutral'}">
          <div class="kpi-label">${esc(k.label)}</div>
          <div class="kpi-value">${esc(k.value)}</div>
          <div class="kpi-change">${k.trend==='up'?'↑':k.trend==='down'?'↓':'→'} ${esc(k.change||'')}</div>
        </div>`).join('')}
    </div>`;
  return el;
}

// ── Rota ──
function rotaSlide(rota) {
  const el = div('slide');
  const days = ['monday','tuesday','wednesday','thursday','friday'];
  const dL = ['Mon','Tue','Wed','Thu','Fri'];
  const rows = (rota.entries||[]).map(e=>`
    <tr><td>${esc(e.name)}</td>${days.map(d=>`<td>${rotaPill(e[d]||'')}</td>`).join('')}</tr>`).join('');
  el.innerHTML = `
    <div class="slide-hdr"><span class="slide-icon">🗓️</span><span class="slide-title">Weekly Rota</span></div>
    <div class="rota-wrap">
      <div class="rota-week">📆 ${esc(rota.week||'')}</div>
      <table class="rota-tbl">
        <thead><tr><th>Name</th>${dL.map(d=>`<th>${d}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  return el;
}

// ── Tasks ──
function tasksSlide(tasks) {
  const el = div('slide');
  el.innerHTML = `
    <div class="slide-hdr"><span class="slide-icon">✅</span><span class="slide-title">Team Tasks</span></div>
    <div class="tasks-grid">
      ${tasks.map(t=>`
        <div class="task-card ${t.priority||'medium'}">
          <div class="task-text">${esc(t.text)}</div>
          <div class="task-meta">
            ${t.assignee?`<span class="task-who">👤 ${esc(t.assignee)}</span>`:''}
            <span class="task-pri">${t.priority||'medium'}</span>
          </div>
        </div>`).join('')}
    </div>`;
  return el;
}

// ── Birthday / Anniversary ──
function checkBirthdays(list) {
  const now = new Date();
  const mm = now.getMonth() + 1;
  const dd = now.getDate();
  return list.filter(b => {
    const [bm, bday] = b.date.split('-').map(Number);
    return bm === mm && bday === dd;
  });
}

function bdaySlide(b) {
  const el = div('slide');
  const isAnni = b.type === 'anniversary';
  const emoji  = isAnni ? '🎊' : '🎂';
  const typeStr = isAnni ? '🎊 Work Anniversary' : '🎂 Happy Birthday';
  const msg = isAnni
    ? `Celebrating ${b.years ? b.years + ' incredible year' + (b.years>1?'s':'') : 'another year'} with the team!`
    : `Wishing you an amazing day — enjoy every moment! 🥳`;

  const colours = ['#f87171','#fbbf24','#34d399','#38bdf8','#a78bfa','#f472b6'];
  let confetti = '';
  for(let i=0;i<28;i++){
    const c = colours[i%colours.length];
    const left = Math.random()*100;
    const dur  = 3 + Math.random()*4;
    const delay= Math.random()*5;
    confetti += `<div class="cc" style="left:${left}%;background:${c};animation-duration:${dur}s;animation-delay:-${delay}s;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;"></div>`;
  }

  el.innerHTML = `
    <div class="slide-hdr"><span class="slide-icon">${emoji}</span><span class="slide-title">${typeStr}</span></div>
    <div class="bday-slide">
      <div class="confetti">${confetti}</div>
      <div class="bday-emoji">${emoji}</div>
      <div class="bday-name">${esc(b.name)}</div>
      <div class="bday-type">${typeStr}</div>
      <div class="bday-msg">${esc(msg)}</div>
    </div>`;
  return el;
}

// ── Countdown ──
function countdownSlide(cds) {
  const el = div('slide');
  const colours = [
    'var(--blue)','var(--purple)','var(--green)','var(--amber)'
  ];
  const cards = cds.slice(0,4).map((c,i) => {
    const target = new Date(c.date);
    const now    = new Date();
    const diff   = Math.max(0, target - now);
    const totalD = Math.floor(diff / 86400000);
    const h      = Math.floor((diff % 86400000) / 3600000);
    const m      = Math.floor((diff % 3600000)  / 60000);
    const colour = colours[i % colours.length];
    const past   = diff <= 0;
    return `
      <div class="cd-card">
        <div class="cd-accent" style="background:${colour}"></div>
        <div class="cd-label">${esc(c.label)}</div>
        ${past ? `<div class="cd-nums"><span class="cd-n" style="color:${colour}">Today!</span></div>` : `
        <div class="cd-nums">
          <div class="cd-unit"><span class="cd-n" style="color:${colour}">${totalD}</span><span class="cd-u">days</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-unit"><span class="cd-n" style="color:${colour}">${String(h).padStart(2,'0')}</span><span class="cd-u">hrs</span></div>
          <span class="cd-sep">:</span>
          <div class="cd-unit"><span class="cd-n" style="color:${colour}">${String(m).padStart(2,'0')}</span><span class="cd-u">min</span></div>
        </div>`}
        <div class="cd-date">📅 ${target.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="slide-hdr"><span class="slide-icon">⏳</span><span class="slide-title">Countdowns</span></div>
    <div class="cd-grid">${cards}</div>`;

  // Live tick every minute
  el._liveTick = setInterval(() => {
    if (!el.classList.contains('active')) return;
    const parent = el.parentNode;
    if (parent) { parent.removeChild(el); parent.appendChild(el); }
    rebuildCountdownInPlace(el, cds);
  }, 60000);

  return el;
}

function rebuildCountdownInPlace(el, cds) {
  const tmp = countdownSlide(cds);
  el.innerHTML = tmp.innerHTML;
}

// ── Weekly Win ──
function winSlide(w) {
  const el = div('slide');
  el.innerHTML = `
    <div class="slide-hdr"><span class="slide-icon">🏆</span><span class="slide-title">Weekly Win</span></div>
    <div class="win-card">
      <div class="win-glow"></div>
      <div class="win-trophy">🏆</div>
      <div class="win-headline">${esc(w.headline||'')}</div>
      <div class="win-detail">${esc(w.detail||'')}</div>
      ${w.who?`
      <div class="win-who">
        <span class="win-stars">⭐⭐⭐</span>
        <span class="win-who-name">${esc(w.who)}</span>
        <span class="win-stars">⭐⭐⭐</span>
      </div>`:''}
    </div>`;
  return el;
}

// ── Thermometer ──
function thermoSlide(t) {
  const el = div('slide');
  const pct = Math.min(100, Math.round((t.current / t.target) * 100));
  const colour = pct >= 100 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--red)';
  const mood = pct >= 100 ? '🎯 Target smashed!' : pct >= 75 ? '📈 Looking great!' : pct >= 50 ? '💪 Halfway there!' : '🚀 Let\'s push harder!';

  // SVG thermometer
  const fillH = Math.round(160 * (pct / 100));
  const thermSVG = `
    <svg viewBox="0 0 60 220" xmlns="http://www.w3.org/2000/svg" id="thermo-svg">
      <defs>
        <clipPath id="fill-clip">
          <rect x="18" y="${220 - fillH - 30}" width="24" height="${fillH}" rx="2"/>
        </clipPath>
      </defs>
      <!-- tube -->
      <rect x="18" y="20" width="24" height="160" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <!-- fill -->
      <rect x="18" y="${220 - fillH - 30}" width="24" height="${fillH}" rx="2" fill="${colour}" opacity="0.85"/>
      <!-- bulb -->
      <circle cx="30" cy="195" r="22" fill="${colour}" opacity="0.85"/>
      <circle cx="30" cy="195" r="14" fill="${colour}"/>
      <!-- markers -->
      ${[0,25,50,75,100].map(p=>{
        const y = 180 - Math.round(160*(p/100));
        return `<line x1="42" y1="${y}" x2="50" y2="${y}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                <text x="52" y="${y+4}" fill="rgba(255,255,255,0.35)" font-size="8" font-family="Barlow,sans-serif">${p}%</text>`;
      }).join('')}
    </svg>`;

  el.innerHTML = `
    <div class="slide-hdr"><span class="slide-icon">🎯</span><span class="slide-title">Team Target — ${esc(t.label||'')}</span></div>
    <div class="thermo-wrap">
      <div class="thermo-left">
        <div>
          <div class="thermo-label">Current</div>
          <div class="thermo-value" style="color:${colour}">${esc(String(t.current))}</div>
        </div>
        <div>
          <div class="thermo-label">Target</div>
          <div class="thermo-target">${esc(String(t.target))} ${esc(t.unit||'')}</div>
        </div>
        <div class="thermo-pct" style="color:${colour}">${pct}%</div>
        <div class="thermo-msg">${mood}${t.message ? ' ' + esc(t.message) : ''}</div>
      </div>
      <div class="thermo-right">${thermSVG}</div>
    </div>`;
  return el;
}

// ── Team Status ──
function statusSlide(team) {
  const el = div('slide');
  el.id = 'status-slide';
  el.innerHTML = `
    <div class="slide-hdr">
      <span class="slide-icon">🚦</span>
      <span class="slide-title">Team Status</span>
      <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-head)">tap a card to update</span>
    </div>
    <div class="status-grid" id="status-grid"></div>`;
  renderStatusCards(team, el);
  return el;
}

function renderStatusCards(team, el) {
  const stored = getSavedStatuses();
  const grid = el.querySelector('#status-grid');
  if (!grid) return;
  grid.innerHTML = team.map((member, i) => {
    const stId  = stored[member.name] || member.default_status || 'in';
    const stObj = STATUSES.find(s => s.id === stId) || STATUSES[0];
    const init  = member.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    return `
      <div class="status-card st-${stId}" onclick="openStatusPicker('${esc(member.name)}')">
        <div class="s-avatar">${init}</div>
        <div class="s-name">${esc(member.name)}</div>
        <div class="s-status">${stObj.emoji} ${stObj.label}</div>
      </div>`;
  }).join('');
}

function getSavedStatuses() {
  try { return JSON.parse(localStorage.getItem(STATUS_KEY) || '{}'); } catch { return {}; }
}

function saveStatus(name, stId) {
  const d = getSavedStatuses(); d[name] = stId;
  localStorage.setItem(STATUS_KEY, JSON.stringify(d));
}

let pickerTarget = null;
function openStatusPicker(name) {
  pickerTarget = name;
  document.getElementById('s-modal-name').textContent = '📍 ' + name;
  const opts = document.getElementById('s-opts');
  opts.innerHTML = STATUSES.map(s => `
    <div class="s-opt" onclick="pickStatus('${s.id}')">
      <div class="s-opt-dot" style="background:${s.color}"></div>
      ${s.emoji} ${s.label}
    </div>`).join('');
  document.getElementById('s-overlay').classList.add('open');
}

function pickStatus(stId) {
  if (!pickerTarget) return;
  saveStatus(pickerTarget, stId);
  document.getElementById('s-overlay').classList.remove('open');
  // Refresh status cards
  const el = document.getElementById('status-slide');
  if (el && cfg?.team) renderStatusCards(cfg.team, el);
}

function overlayClose(e) {
  if (e.target.id === 's-overlay') document.getElementById('s-overlay').classList.remove('open');
}

// ── Leaderboard ──
function leaderboardSlide(board) {
  const el = div('slide');
  el.id = 'lb-slide';

  const sorted = [...board].sort((a, b) => b.points - a.points);
  const max    = sorted[0]?.points || 1;
  const medals = ['🥇','🥈','🥉'];

  const rows = sorted.map((p, i) => {
    const rank   = i + 1;
    const rankCls= rank <= 3 ? `rank-${rank}` : '';
    const medal  = medals[i] || '';
    const barPct = Math.round((p.points / max) * 100);
    const chg    = p.change > 0 ? `up` : p.change < 0 ? `down` : `same`;
    const chgTxt = p.change > 0 ? `▲ +${p.change}` : p.change < 0 ? `▼ ${p.change}` : `—`;
    return `
      <div class="lb-row ${rankCls}" data-pct="${barPct}">
        <div class="lb-bar" style="width:0%"></div>
        <div class="lb-rank">${rank}</div>
        <div class="lb-medal">${medal}</div>
        <div class="lb-info">
          <div class="lb-name">${esc(p.name)}</div>
          ${p.title ? `<div class="lb-title">${esc(p.title)}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div class="lb-score">${p.points}</div>
          <div class="lb-pts">pts</div>
          <div class="lb-change ${chg}">${chgTxt}</div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="slide-hdr">
      <span class="slide-icon">🏅</span>
      <span class="slide-title">Team Leaderboard</span>
      <span class="slide-tag" style="background:rgba(251,191,36,.15);color:var(--amber)">${sorted[0]?.name || ''} leads!</span>
    </div>
    <div class="lb-wrap">${rows}</div>`;

  // Animate bars when slide becomes active
  el._animateBars = () => {
    el.querySelectorAll('.lb-row').forEach(row => {
      const pct = row.dataset.pct;
      const bar = row.querySelector('.lb-bar');
      bar.style.width = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        bar.style.transition = 'width 1.2s cubic-bezier(.4,0,.2,1)';
        bar.style.width = pct + '%';
      }));
    });
  };

  return el;
}

function jumpToLeaderboard() {
  if (lbSlideIndex < 0) return;
  clearInterval(timer);
  show(lbSlideIndex);
  startPlay();
  // Animate the bars
  setTimeout(() => slides[lbSlideIndex]?._animateBars?.(), 100);
}

// ── Meme / GIF ──
function memeSlide(m) {
  const el = div('slide');
  el.innerHTML = `
    <div class="slide-hdr">
      <span class="slide-icon">😂</span>
      <span class="slide-title">Meme of the Day</span>
    </div>
    <div class="meme-wrap">
      <div class="meme-tag">Today's mood 👇</div>
      <img class="meme-img" src="${esc(m.url)}" alt="meme"
           onerror="this.src='';this.alt='Could not load image — check the URL in data.json'"/>
      ${m.caption ? `<div class="meme-caption">${esc(m.caption)}</div>` : ''}
    </div>`;
  return el;
}


let newsItems = [];

function buildTicker() {
  rebuildTickerTrack();
  const dur = Math.max(30, ((cfg?.ticker?.length||0) + newsItems.length) * 7);
  document.getElementById('ticker-track').style.animationDuration = dur + 's';
}

function rebuildTickerTrack() {
  const manual = cfg?.ticker || [];
  const all    = [...manual, ...newsItems, ...manual, ...newsItems];
  if (!all.length) return;
  document.getElementById('ticker-track').innerHTML =
    all.map((t, i) => {
      const isNews = i >= manual.length && i < manual.length + newsItems.length ||
                     i >= manual.length*2 + newsItems.length;
      return `<span class="tick-item${isNews?' tick-news':''}">${esc(t)}</span>`;
    }).join('');
}

async function loadNews(rssUrl) {
  try {
    const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&count=6`;
    const r   = await fetch(api);
    const d   = await r.json();
    if (d.status === 'ok' && d.items?.length) {
      newsItems = d.items.map(i => `📰 ${i.title}`);
      rebuildTickerTrack();
    }
  } catch { /* news unavailable */ }
  setInterval(() => loadNews(rssUrl), 20 * 60 * 1000);
}

// ══════════════════════════════════════════
// SLIDESHOW
// ══════════════════════════════════════════
function show(i) {
  slides.forEach((s,idx) => s.classList.toggle('active', idx===i));
  cur = i; updateDots(); animProg();
  // Animate leaderboard bars if jumping to that slide
  if (i === lbSlideIndex) setTimeout(() => slides[i]?._animateBars?.(), 300);
}
function next() { show((cur+1) % slides.length); }
function startPlay() {
  if (timer) clearInterval(timer);
  const dur = (cfg?.slide_duration || 10) * 1000;
  timer = setInterval(next, dur);
}
function animProg() {
  const fill = document.getElementById('prog-fill');
  const dur  = (cfg?.slide_duration || 10) * 1000;
  fill.style.transition = 'none'; fill.style.width = '0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.transition = `width ${dur}ms linear`; fill.style.width = '100%';
  }));
}
function makeDots() {
  document.getElementById('slide-dots').innerHTML =
    slides.map((_,i)=>`<div class="dot${i===0?' active':''}" onclick="jump(${i})"></div>`).join('');
}
function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
}
function jump(i) { clearInterval(timer); show(i); startPlay(); }

// ══════════════════════════════════════════
// WEATHER
// ══════════════════════════════════════════
async function getWeather(city) {
  try {
    const r = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
    const d = await r.json();
    const c = d.current_condition?.[0];
    if (!c) return;
    document.getElementById('w-temp').textContent = c.temp_C + '°C';
    document.getElementById('w-desc').textContent = (c.weatherDesc?.[0]?.value||'').toLowerCase();
  } catch {}
}
setInterval(()=>{ if(cfg?.weather_city) getWeather(cfg.weather_city); }, 30*60*1000);

// ══════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('date-str').textContent = n.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
tick(); setInterval(tick, 1000);

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function div(cls) { const el=document.createElement('div'); el.className=cls; return el; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function rotaPill(v) {
  if(!v) return '';
  const lv=v.toLowerCase();
  const cls=lv==='office'?'pill-office':lv==='remote'?'pill-remote':lv==='leave'?'pill-leave':'pill-off';
  return `<span class="pill ${cls}">${esc(v)}</span>`;
}
function pc(pri,a) {
  const m={urgent:'248,113,113',important:'251,191,36',normal:'56,189,248'};
  const rgb=m[pri]||m.normal;
  return a?`rgba(${rgb},${a})`:`rgb(${rgb})`;
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.error);
</script>
